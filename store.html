<!DOCTYPE html>
<html>
<head>

<title>Celestial Vault</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

#spaceCanvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
pointer-events:none;
}

body{
background:linear-gradient(140deg,#020617,#1e1b4b,#020617,#4c1d95);
background-size:400% 400%;
animation:cosmic 30s ease infinite;
overflow-x:hidden;
touch-action:none;
}

@keyframes cosmic{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(-12px);}
100%{transform:translateY(0px);}
}

@keyframes glow{
0%{box-shadow:0 0 5px #facc15;}
50%{box-shadow:0 0 30px #facc15;}
100%{box-shadow:0 0 5px #facc15;}
}

@keyframes shine{
0%{transform:translateX(-100%);}
100%{transform:translateX(300%);}
}

.titleGlow{
text-shadow:
0 0 12px rgba(125,211,252,0.8),
0 0 40px rgba(192,132,252,0.7);
}

</style>

</head>

<body class="text-white min-h-screen">

<canvas id="spaceCanvas"></canvas>

<!-- HEADER -->
<div class="relative z-10 text-center pt-10 pb-6 px-4">

<h1 class="text-3xl md:text-5xl font-bold text-cyan-300 tracking-widest titleGlow">
Celestial Vault
</h1>

<p class="text-purple-300 mt-2 text-sm md:text-lg">
Where Energy Becomes Power
</p>

</div>

<!-- REWARDS -->
<div id="rewardsContainer"
class="relative z-10 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 md:gap-12 px-4 md:px-12 pb-20">
</div>

<!-- LEDGER -->
<div class="relative z-10 px-4 md:px-12 pb-20">

<h2 class="text-xl md:text-3xl font-bold mb-6 text-cyan-300">
Energy Ledger
</h2>

<div id="ledgerContainer" class="space-y-3"></div>

</div>

<script>

/* ================= SUPABASE ================= */

const SUPABASE_URL = "https://hqsoabsocbulfrcbgxlz.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhxc29hYnNvY2J1bGZyY2JneGx6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NjAyMTgsImV4cCI6MjA4OTIzNjIxOH0.Rim6h7dRgkce3IzSPMNSSzwImAM0sagho0I4X8MjuW4";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const USER_ID = 1;

/* ================= LOAD REWARDS ================= */

async function loadRewards(){

let { data } = await client.from("rewards").select("*");

let container = document.getElementById("rewardsContainer");
container.innerHTML = "";

data.forEach(r => {

container.innerHTML += `
<div class="relative group bg-purple-500/10 backdrop-blur-xl border border-purple-400/30
p-6 rounded-2xl transition duration-500 hover:scale-110 hover:border-purple-400
shadow-xl hover:shadow-purple-400/40 animate-[float_6s_ease-in-out_infinite]">

<div class="absolute inset-0 rounded-2xl opacity-0 group-hover:opacity-100 transition duration-500"
style="animation: glow 2s infinite;"></div>

<h2 class="text-xl font-semibold mb-2 text-purple-300">
${r.title}
</h2>

<p class="text-gray-300 mb-4 text-sm">
${r.description || ""}
</p>

<p class="text-cyan-300 font-semibold mb-4">
Energy Cost: ${r.cost}
</p>

<button onclick="buyItem(${r.id}, ${r.cost})"
class="relative overflow-hidden bg-gradient-to-r from-purple-500 to-indigo-600
px-4 py-2 rounded-lg w-full font-semibold tracking-wide
hover:scale-105 transition shadow-lg">

Acquire Artifact

<span class="absolute top-0 left-0 w-20 h-full bg-white/30 skew-x-12"
style="animation: shine 2s infinite;"></span>

</button>

</div>
`;

});

}

loadRewards();

/* ================= BUY ================= */

async function buyItem(id, cost){

let { data:user } = await client
.from("users_data")
.select("*")
.eq("id", USER_ID)
.single();

if(user.garnet < cost){
alert("Not enough Garnet");
return;
}

await client.from("users_data").update({
garnet: user.garnet - cost
}).eq("id", USER_ID);

await client.from("purchases").insert({
user_id: USER_ID,
reward_id: id,
created_at: new Date()
});

loadLedger();
alert("Artifact Acquired!");

}

/* ================= LEDGER ================= */

async function loadLedger(){

let { data } = await client
.from("purchases")
.select("*")
.order("created_at", { ascending: false });

let container = document.getElementById("ledgerContainer");
container.innerHTML = "";

data.forEach(p => {

container.innerHTML += `
<div class="bg-gray-900/60 backdrop-blur border border-purple-700
p-4 md:p-5 rounded-xl flex flex-col md:flex-row justify-between items-start md:items-center
transition hover:border-purple-400 hover:scale-[1.02]">

<span class="text-gray-200 text-sm md:text-lg">
Artifact #${p.reward_id} acquired
</span>

<span class="text-gray-400 text-xs md:text-sm">
${new Date(p.created_at).toLocaleString()}
</span>

</div>
`;

});

}

loadLedger();

/* ================= CANVAS ================= */

const canvas=document.getElementById("spaceCanvas");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;
}
resize();
window.addEventListener("resize",resize);

let mouse={x:null,y:null};

window.addEventListener("mousemove",e=>{
mouse.x=e.clientX;
mouse.y=e.clientY;
});

window.addEventListener("touchmove",e=>{
let t=e.touches[0];
mouse.x=t.clientX;
mouse.y=t.clientY;
});

/* stars */

class Star{
constructor(){
this.x=Math.random()*canvas.width;
this.y=Math.random()*canvas.height;
this.vx=(Math.random()-0.5)*0.2;
this.vy=(Math.random()-0.5)*0.2;
this.size=Math.random()*2+1;
}
update(){this.x+=this.vx;this.y+=this.vy;}
draw(){
ctx.beginPath();
ctx.arc(this.x,this.y,this.size,0,Math.PI*2);
ctx.fillStyle="rgba(125,211,252,0.9)";
ctx.shadowBlur=8;
ctx.fill();
}
}

let stars=[];
for(let i=0;i<140;i++) stars.push(new Star());

function connectStars(){
for(let a=0;a<stars.length;a++){
for(let b=a;b<stars.length;b++){
let dx=stars[a].x-stars[b].x;
let dy=stars[a].y-stars[b].y;
let dist=Math.sqrt(dx*dx+dy*dy);
if(dist<120){
ctx.strokeStyle="rgba(192,132,252,"+(1-dist/120)+")";
ctx.beginPath();
ctx.moveTo(stars[a].x,stars[a].y);
ctx.lineTo(stars[b].x,stars[b].y);
ctx.stroke();
}
}
}
}

function mouseConstellation(){
stars.forEach(star=>{
let dx=star.x-mouse.x;
let dy=star.y-mouse.y;
let dist=Math.sqrt(dx*dx+dy*dy);
if(dist<150){
ctx.beginPath();
ctx.moveTo(star.x,star.y);
ctx.lineTo(mouse.x,mouse.y);
ctx.strokeStyle="rgba(236,72,153,0.7)";
ctx.stroke();
}
});
}

function animate(){
ctx.clearRect(0,0,canvas.width,canvas.height);

stars.forEach(s=>{
s.update();
s.draw();
});

connectStars();
mouseConstellation();

requestAnimationFrame(animate);
}

animate();

</script>

</body>
</html>
