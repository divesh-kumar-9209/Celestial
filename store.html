<!DOCTYPE html>
<html>
<head>

<title>Celestial Vault</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>

#spaceCanvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:0;
pointer-events:none;
}

body{
background:linear-gradient(140deg,#020617,#1e1b4b,#020617,#4c1d95);
background-size:400% 400%;
animation:cosmic 30s ease infinite;
overflow-x:hidden;
touch-action:none;
}

@keyframes cosmic{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.modal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:flex;
align-items:center;
justify-content:center;
z-index:9999;
}

.modal-box{
background:rgba(20,20,40,0.9);
border:1px solid rgba(255,255,255,0.1);
padding:30px;
border-radius:20px;
text-align:center;
}

</style>

</head>

<body class="text-white min-h-screen">

<!-- 🔥 USER SELECT MODAL -->
<div id="userModal" class="modal">

<div class="modal-box">

<h2 class="text-2xl mb-6">Choose Your Energy</h2>

<div class="flex gap-6 justify-center">

<button onclick="selectUser('garnet')"
class="bg-red-600 px-6 py-3 rounded-lg hover:scale-110 transition">
Garnet
</button>

<button onclick="selectUser('sapphire')"
class="bg-blue-600 px-6 py-3 rounded-lg hover:scale-110 transition">
Sapphire
</button>

</div>

</div>

</div>

<canvas id="spaceCanvas"></canvas>

<!-- HEADER -->
<div class="relative z-10 text-center pt-10 pb-6 px-4">

<h1 class="text-3xl md:text-5xl font-bold text-cyan-300">
Celestial Vault
</h1>

</div>

<!-- REWARDS -->
<div id="rewardsContainer"
class="relative z-10 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6 px-4 pb-20">
</div>

<!-- LEDGER -->
<div class="relative z-10 px-4 pb-20">

<h2 class="text-xl md:text-3xl mb-6 text-cyan-300">
Energy Ledger
</h2>

<div id="ledgerContainer" class="space-y-3"></div>

</div>

<script>

/* ================= SUPABASE ================= */

const SUPABASE_URL = "https://hqsoabsocbulfrcbgxlz.supabase.co";
const SUPABASE_KEY = "YOUR_KEY";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const USER_ID = 1;

/* ================= USER SELECT ================= */

let USER_TYPE = localStorage.getItem("userType");

if(!USER_TYPE){
document.getElementById("userModal").style.display = "flex";
}else{
document.getElementById("userModal").style.display = "none";
}

function selectUser(type){
USER_TYPE = type;
localStorage.setItem("userType", type);
document.getElementById("userModal").style.display = "none";
}

/* ================= LOAD REWARDS ================= */

async function loadRewards(){

let { data } = await client.from("rewards").select("*");

let container = document.getElementById("rewardsContainer");
container.innerHTML = "";

data.forEach(r => {

container.innerHTML += `
<div class="bg-purple-500/10 backdrop-blur p-6 rounded-xl border border-purple-400">

<h2 class="text-xl mb-2">${r.title}</h2>
<p class="text-sm mb-2">${r.description || ""}</p>
<p class="mb-3">Cost: ${r.cost}</p>

<button onclick="buyItem(${r.id}, ${r.cost})"
class="bg-purple-600 px-4 py-2 rounded">
Acquire
</button>

</div>
`;

});

}

loadRewards();

/* ================= BUY ================= */

async function buyItem(id, cost){

if(!USER_TYPE){
alert("Select energy first");
return;
}

let { data:user } = await client
.from("users_data")
.select("*")
.eq("id", USER_ID)
.single();

if(user[USER_TYPE] < cost){
alert("Not enough energy");
return;
}

let { data:reward } = await client
.from("rewards")
.select("*")
.eq("id", id)
.single();

let time = new Date().toLocaleString();

let actorName = USER_TYPE === "garnet" ? "Garnet" : "Sapphire";

let message = `${actorName} manifested ${reward.title} at ${time}`;

await client.from("users_data").update({
[USER_TYPE]: user[USER_TYPE] - cost
}).eq("id", USER_ID);

await client.from("purchases").insert({
user_id: USER_ID,
reward_id: id,
created_at: new Date(),
message: message,
actor: USER_TYPE
});

alert(message);

loadLedger();

}

/* ================= LEDGER ================= */

async function loadLedger(){

let { data } = await client
.from("purchases")
.select("*")
.order("created_at", { ascending: false });

let container = document.getElementById("ledgerContainer");
container.innerHTML = "";

data.forEach(p => {

container.innerHTML += `
<div class="bg-gray-900 p-4 rounded">

<p>${p.message}</p>
<p class="text-gray-400 text-sm">${new Date(p.created_at).toLocaleString()}</p>

</div>
`;

});

}

loadLedger();

</script>

</body>
</html>
