<!DOCTYPE html>
<html>
<head>

<title>Admin Panel</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdn.jsdelivr.net/npm/tailwindcss@3.4.1/dist/tailwind.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

</head>

<body class="bg-black text-white min-h-screen p-10">

<h1 class="text-3xl font-bold mb-10">
Admin Panel
</h1>

<!-- USERS -->

<h2 class="text-xl mb-4">Users</h2>

<table class="w-full mb-10">

<tr class="text-left border-b border-gray-700">
<th>Name</th>
<th>Points</th>
<th>Add</th>
<th>Remove</th>
<th>Reset</th>
</tr>

<tr class="border-b border-gray-800">

<td>Sapphire</td>
<td id="sapphirePoints">0</td>

<td>
<input id="addSapphire" placeholder="points" class="text-black w-20">
<button onclick="addPoints('sapphire')" class="bg-green-600 px-2 py-1">Add</button>
</td>

<td>
<input id="removeSapphire" placeholder="points" class="text-black w-20">
<button onclick="removePoints('sapphire')" class="bg-red-600 px-2 py-1">Remove</button>
</td>

<td>
<button onclick="resetPoints('sapphire')" class="bg-yellow-600 px-2 py-1">Reset</button>
</td>

</tr>

<tr class="border-b border-gray-800">

<td>Garnet</td>
<td id="garnetPoints">0</td>

<td>
<input id="addGarnet" placeholder="points" class="text-black w-20">
<button onclick="addPoints('garnet')" class="bg-green-600 px-2 py-1">Add</button>
</td>

<td>
<input id="removeGarnet" placeholder="points" class="text-black w-20">
<button onclick="removePoints('garnet')" class="bg-red-600 px-2 py-1">Remove</button>
</td>

<td>
<button onclick="resetPoints('garnet')" class="bg-yellow-600 px-2 py-1">Reset</button>
</td>

</tr>

</table>

<!-- ADD REWARD -->

<h2 class="text-xl mb-4">Add Reward</h2>

<div class="mb-10 flex gap-4">

<input id="title" placeholder="Title" class="text-black p-2">
<input id="description" placeholder="Description" class="text-black p-2">
<input id="cost" placeholder="Points" class="text-black p-2">

<button onclick="addReward()" class="bg-green-600 px-4 py-2">
Add
</button>

</div>

<!-- REWARD LIST -->

<h2 class="text-xl mb-4">Rewards</h2>

<div id="rewardsList"></div>

<div class="mt-4">
<button onclick="deleteAllRewards()" class="bg-red-700 px-4 py-2">
Delete All Rewards
</button>
</div>

<!-- PURCHASE HISTORY -->

<h2 class="text-xl mt-12 mb-4">Purchase History</h2>

<div id="purchaseList"></div>

<script>

/* ================= SUPABASE ================= */

const SUPABASE_URL = "https://hqsoabsocbulfrcbgxlz.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhxc29hYnNvY2J1bGZyY2JneGx6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NjAyMTgsImV4cCI6MjA4OTIzNjIxOH0.Rim6h7dRgkce3IzSPMNSSzwImAM0sagho0I4X8MjuW4";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const USER_ID = 1;
/* ================= LOAD POINTS ================= */

async function loadPoints(){

let { data } = await client
.from("users_data")
.select("*")
.eq("id", USER_ID)
.single();

document.getElementById("garnetPoints").innerText = data.garnet;
document.getElementById("sapphirePoints").innerText = data.sapphire;

}

loadPoints();

/* ================= POINT FUNCTIONS ================= */

async function addPoints(type){

let val = parseInt(document.getElementById(`add${capitalize(type)}`).value);

let { data } = await client.from("users_data").select("*").eq("id", 1).single();

await client.from("users_data").update({
[type]: data[type] + val
}).eq("id", 1);

/* SAVE HISTORY */
let message = `God manifested ${val} energy to ${capitalize(type)}`;

await client.from("purchases").insert({
user_id: 1,
reward_id: null,
created_at: new Date(),
message: message,
actor: "god"
});

loadPoints();
loadPurchases();

}

async function removePoints(type){

let val = parseInt(document.getElementById(`remove${capitalize(type)}`).value);

let { data } = await client.from("users_data").select("*").eq("id", 1).single();

/* UPDATE */
await client.from("users_data").update({
[type]: Math.max(0, data[type] - val)
}).eq("id", 1);

/* 🔥 MESSAGE */
let message = `God removed ${val} energy from ${capitalize(type)}`;

/* SAVE HISTORY */
await client.from("purchases").insert({
user_id: 1,
reward_id: null,
created_at: new Date(),
message: message,
actor: "god"
});

loadPoints();
loadPurchases();

}

async function resetPoints(type){

await client.from("users_data").update({
[type]: 0
}).eq("id", USER_ID);

loadPoints();

}

function capitalize(str){
return str.charAt(0).toUpperCase() + str.slice(1);
}

/* ================= REWARDS ================= */

async function loadRewards(){

let { data } = await client.from("rewards").select("*");

let container = document.getElementById("rewardsList");
container.innerHTML = "";

data.forEach(r => {

container.innerHTML += `
<div class="flex justify-between border-b border-gray-700 py-2">

<span>${r.title} (${r.cost} points)</span>

<button onclick="deleteReward(${r.id})" class="text-red-500">
Delete
</button>

</div>
`;

});

}

loadRewards();

async function addReward(){

let title = document.getElementById("title").value;
let description = document.getElementById("description").value;
let cost = parseInt(document.getElementById("cost").value);

await client.from("rewards").insert({
title, description, cost
});

loadRewards();

}

async function deleteReward(id){
await client.from("rewards").delete().eq("id",id);
loadRewards();
}

async function deleteAllRewards(){
await client.from("rewards").delete().neq("id",0);
loadRewards();
}

/* ================= PURCHASE HISTORY ================= */

async function loadPurchases(){

let { data } = await client
.from("purchases")
.select("*")
.order("created_at", { ascending: false });

let container = document.getElementById("purchaseList");
container.innerHTML = "";

data.forEach(p => {

container.innerHTML += `
<div class="flex justify-between border-b border-gray-800 py-3">

<span>
User purchased item ${p.reward_id}
</span>

<div class="flex gap-4">

<span class="text-gray-400 text-sm">
${new Date(p.created_at).toLocaleString()}
</span>

<button onclick="deletePurchase(${p.id})" class="text-red-500">
Delete
</button>

</div>

</div>
`;

});

}

loadPurchases();

async function deletePurchase(id){
await client.from("purchases").delete().eq("id",id);
loadPurchases();
}
const USER_TYPE = localStorage.getItem("userType") || "garnet";
</script>

</body>
</html>
