<!DOCTYPE html>
<html>
<head>
<title>Admin Panel</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://unpkg.com/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<style>
body{
background:linear-gradient(140deg,#020617,#0f172a,#020617);
background-size:400% 400%;
animation:cosmic 25s ease infinite;
}
table {
  border-collapse: separate;
  border-spacing: 0 12px;
}
th, td {
  text-align: left;
  vertical-align: middle;
}
@keyframes cosmic{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

.card{
background:rgba(30,41,59,0.5);
backdrop-filter:blur(10px);
border:1px solid rgba(148,163,184,0.2);
border-radius:16px;
padding:16px;
margin-bottom:20px;
}

.btn{
padding:6px 12px;
border-radius:8px;
font-weight:600;
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
}
</style>
</head>

<body class="text-white min-h-screen p-4 md:p-10">

<h1 class="text-3xl font-bold mb-8 text-center">Admin Panel</h1>

<!-- USERS -->
<div class="card">
<h2 class="text-xl mb-4 text-cyan-300">Users</h2>

<table class="w-full text-left table-fixed">
<tr>
<th class="w-1/6">Name</th>
<th class="w-1/6">Points</th>
<th class="w-1/4">Add</th>
<th class="w-1/4">Remove</th>
<th class="w-1/6">Reset</th>
</tr>

<tr>
<td class="py-2">Sapphire</td>
<td id="sapphirePoints">0</td>
<td>
<div class="flex items-center gap-2">
  <input id="addSapphire" class="text-black w-20 px-2 py-1 rounded">
  <button onclick="addPoints('sapphire')" class="btn bg-green-600 whitespace-nowrap">
    Add
  </button>
</div>
</td>
<td>
<div class="flex items-center gap-2">
  <input id="removeSapphire" class="text-black w-20 px-2 py-1 rounded">
  <button onclick="removePoints('sapphire')" class="btn bg-red-600 whitespace-nowrap">
    Remove
  </button>
</div>
</td>
<td>
<button onclick="resetPoints('sapphire')" class="btn bg-yellow-600 whitespace-nowrap">Reset</button>
</td>
</tr>

<tr>
<td class="py-2">Garnet</td>
<td id="garnetPoints">0</td>
<td>
<div class="flex items-center gap-2">
  <input id="addGarnet" class="text-black w-20 px-2 py-1 rounded">
  <button onclick="addPoints('Garnet')" class="btn bg-green-600 whitespace-nowrap">
    Add
  </button>
</div>
</td>
<td>
<div class="flex items-center gap-2">
  <input id="removeGarnet" class="text-black w-20 px-2 py-1 rounded">
  <button onclick="removePoints('sapphire')" class="btn bg-red-600 whitespace-nowrap">
    Remove
  </button>
</div>
</td>
<td>
<button onclick="resetPoints('garnet')" class="btn bg-yellow-600 whitespace-nowrap">Reset</button>
</td>
</tr>
</table>
</div>

<!-- ADD REWARD -->
<div class="card">
<h2 class="text-xl mb-4 text-purple-300">Add Reward</h2>

<input id="title" placeholder="Title" class="text-black p-2 w-full mb-2">
<input id="description" placeholder="Description" class="text-black p-2 w-full mb-2">
<input id="cost" placeholder="Energy" class="text-black p-2 w-full mb-2">

<button onclick="addReward()" class="btn bg-purple-600">Add</button>
</div>

<!-- REWARDS -->
<div class="card">
<h2 class="text-xl mb-4 text-purple-300">Rewards</h2>
<div id="rewardsList"></div>
</div>

<!-- LEDGER -->
<div class="card">
<h2 class="text-xl mb-4 text-cyan-300">Energy Ledger</h2>
<div id="purchaseList"></div>
</div>

<!-- Back Button -->
<div class="w-full flex justify-center items-center mt-10">

  <a href="index.html"
  class="px-8 py-3 rounded-full text-lg font-bold
  bg-red-500/10 backdrop-blur-xl border border-red-400/30
  transition duration-500 hover:scale-110 hover:border-red-400
  shadow-xl hover:shadow-red-400/40">

  Back

  </a>

</div>

<script>
const client = supabase.createClient(
"https://hqsoabsocbulfrcbgxlz.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhxc29hYnNvY2J1bGZyY2JneGx6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NjAyMTgsImV4cCI6MjA4OTIzNjIxOH0.Rim6h7dRgkce3IzSPMNSSzwImAM0sagho0I4X8MjuW4"
);


/* POINTS */
async function loadPoints(){
let {data}=await client.from("users_data").select("*").eq("id",1).single();
garnetPoints.innerText=data.garnet;
sapphirePoints.innerText=data.sapphire;
}
loadPoints();

function capitalize(s){
return s.charAt(0).toUpperCase()+s.slice(1);
}

async function addPoints(type){
let val=parseInt(document.getElementById(`add${capitalize(type)}`).value)||0;
let {data}=await client.from("users_data").select("*").eq("id",1).single();

await client.from("users_data").update({
[type]:data[type]+val
}).eq("id",1);

loadPoints();
}

async function removePoints(type){
let val=parseInt(document.getElementById(`remove${capitalize(type)}`).value)||0;
let {data}=await client.from("users_data").select("*").eq("id",1).single();

await client.from("users_data").update({
[type]:Math.max(0,data[type]-val)
}).eq("id",1);

loadPoints();
}

async function resetPoints(type){
await client.from("users_data").update({[type]:0}).eq("id",1);
loadPoints();
}

/* REWARDS */
async function loadRewards(){
let { data } = await client.from("rewards").select("*");

let container = document.getElementById("rewardsList");

container.innerHTML = `
<div class="flex gap-2 mb-3">
<input type="checkbox" id="selectAllRewards" onclick="toggleAllRewards(this)">
<button onclick="deleteSelectedRewards()" class="bg-red-600 px-3 py-1 rounded">Delete Selected</button>
</div>
`;

data.forEach(r => {
container.innerHTML += `
<div class="flex justify-between py-2">
<div>
<input type="checkbox" class="rewardCheckbox" value="${r.id}">
${r.title} (${r.cost})
</div>
<button onclick="deleteReward(${r.id})">Delete</button>
</div>
`;
});
}
loadRewards();

function toggleAllRewards(source){
document.querySelectorAll(".rewardCheckbox").forEach(cb=>{
cb.checked=source.checked;
});
}

async function deleteSelectedRewards(){
let selected=[...document.querySelectorAll(".rewardCheckbox:checked")];

if(selected.length===0){alert("Select first");return;}

for(let cb of selected){
await client.from("rewards").delete().eq("id",cb.value);
}
loadRewards();
}

async function deleteReward(id){
await client.from("rewards").delete().eq("id",id);
loadRewards();
}

async function addReward(){
await client.from("rewards").insert({
title:title.value,
description:description.value,
cost:parseInt(cost.value)
});
loadRewards();
}

/* LEDGER */
async function loadPurchases(){
let { data } = await client.from("purchases").select("*");

let container = document.getElementById("purchaseList");

container.innerHTML = `
<div class="flex gap-2 mb-3">
<input type="checkbox" id="selectAllLedger" onclick="toggleAllLedger(this)">
<button onclick="deleteSelectedPurchases()" class="bg-red-600 px-3 py-1 rounded">Delete Selected</button>
</div>
`;

data.forEach(p=>{
container.innerHTML+=`
<div class="flex justify-between py-2">
<div>
<input type="checkbox" class="ledgerCheckbox" value="${p.id}">
${p.message}
</div>
<button onclick="deletePurchase(${p.id})">Delete</button>
</div>
`;
});
}
loadPurchases();

function toggleAllLedger(source){
document.querySelectorAll(".ledgerCheckbox").forEach(cb=>{
cb.checked=source.checked;
});
}

async function deleteSelectedPurchases(){
let selected=[...document.querySelectorAll(".ledgerCheckbox:checked")];

if(selected.length===0){alert("Select first");return;}

for(let cb of selected){
await client.from("purchases").delete().eq("id",cb.value);
}
loadPurchases();
}

async function deletePurchase(id){
await client.from("purchases").delete().eq("id",id);
loadPurchases();
}
</script>

</body>
</html>
