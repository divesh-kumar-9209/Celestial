<!DOCTYPE html>
<html>
<head>

<title>Admin Panel</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

</head>

<body class="bg-black text-white min-h-screen p-4 md:p-10">

<h1 class="text-2xl md:text-3xl font-bold mb-10">
Admin Panel
</h1>

<!-- USERS -->

<h2 class="text-lg md:text-xl mb-4">Users</h2>

<div class="overflow-x-auto mb-10">
<table class="w-full text-sm md:text-base">

<thead>
<tr class="text-left border-b border-gray-700">
<th>Name</th>
<th>Garnet</th>
<th>Add</th>
<th>Remove</th>
<th>Reset</th>
</tr>
</thead>

<tbody id="usersTable"></tbody>

</table>
</div>

<!-- ADD REWARD -->

<h2 class="text-lg md:text-xl mb-4">Add Reward</h2>

<div class="mb-10 flex flex-col md:flex-row gap-4">

<input id="title" placeholder="Title" class="text-black p-2">
<input id="description" placeholder="Description" class="text-black p-2">
<input id="cost" placeholder="Points" class="text-black p-2">

<button onclick="addReward()" class="bg-green-600 px-4 py-2">
Add
</button>

</div>

<!-- REWARD LIST -->

<h2 class="text-lg md:text-xl mb-4">Rewards</h2>

<div id="rewardsList"></div>

<button onclick="deleteAllRewards()" class="bg-red-700 px-4 py-2 mt-4">
Delete All Rewards
</button>

<!-- PURCHASE HISTORY -->

<h2 class="text-lg md:text-xl mt-12 mb-4">Purchase History</h2>

<div id="purchaseList"></div>

<script>

/* ================= SUPABASE ================= */

const SUPABASE_URL = "https://hqsoabsocbulfrcbgxlz.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhxc29hYnNvY2J1bGZyY2JneGx6Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM2NjAyMTgsImV4cCI6MjA4OTIzNjIxOH0.Rim6h7dRgkce3IzSPMNSSzwImAM0sagho0I4X8MjuW4";

const client = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const USER_ID = 1;
/* ================= LOAD USERS ================= */

async function loadUsers(){

let { data } = await client.from("users_data").select("*");

let table = document.getElementById("usersTable");
table.innerHTML = "";

data.forEach(u => {

table.innerHTML += `
<tr class="border-b border-gray-800">

<td>${u.id}</td>

<td>${u.garnet}</td>

<td>
<input id="add-${u.id}" class="text-black w-16">
<button onclick="addPoints(${u.id})" class="bg-green-600 px-2 py-1">Add</button>
</td>

<td>
<input id="remove-${u.id}" class="text-black w-16">
<button onclick="removePoints(${u.id})" class="bg-red-600 px-2 py-1">Remove</button>
</td>

<td>
<button onclick="resetPoints(${u.id})" class="bg-yellow-600 px-2 py-1">Reset</button>
</td>

</tr>
`;

});

}

loadUsers();

/* ================= POINTS FUNCTIONS ================= */

async function addPoints(id){

let val = parseInt(document.getElementById(`add-${id}`).value);

let { data } = await client.from("users_data").select("*").eq("id",id).single();

await client.from("users_data").update({
garnet: data.garnet + val
}).eq("id",id);

loadUsers();

}

async function removePoints(id){

let val = parseInt(document.getElementById(`remove-${id}`).value);

let { data } = await client.from("users_data").select("*").eq("id",id).single();

await client.from("users_data").update({
garnet: Math.max(0, data.garnet - val)
}).eq("id",id);

loadUsers();

}

async function resetPoints(id){

await client.from("users_data").update({
garnet: 0,
sapphire: 0
}).eq("id",id);

loadUsers();

}

/* ================= REWARDS ================= */

async function loadRewards(){

let { data } = await client.from("rewards").select("*");

let container = document.getElementById("rewardsList");
container.innerHTML = "";

data.forEach(r => {

container.innerHTML += `
<div class="flex justify-between border-b border-gray-700 py-2">

<span>${r.title} (${r.cost})</span>

<button onclick="deleteReward(${r.id})" class="text-red-500">
Delete
</button>

</div>
`;

});

}

loadRewards();

async function addReward(){

let title = document.getElementById("title").value;
let description = document.getElementById("description").value;
let cost = parseInt(document.getElementById("cost").value);

await client.from("rewards").insert({
title, description, cost
});

loadRewards();

}

async function deleteReward(id){

await client.from("rewards").delete().eq("id",id);
loadRewards();

}

async function deleteAllRewards(){

await client.from("rewards").delete().neq("id",0);
loadRewards();

}

/* ================= PURCHASES ================= */

async function loadPurchases(){

let { data } = await client.from("purchases").select("*");

let container = document.getElementById("purchaseList");
container.innerHTML = "";

data.forEach(p => {

container.innerHTML += `
<div class="flex justify-between border-b border-gray-800 py-3">

<span>User ${p.user_id} purchased item ${p.reward_id}</span>

<div class="flex gap-4">

<span class="text-gray-400 text-sm">
${new Date(p.created_at).toLocaleString()}
</span>

<button onclick="deletePurchase(${p.id})" class="text-red-500">
Delete
</button>

</div>

</div>
`;

});

}

loadPurchases();

async function deletePurchase(id){

await client.from("purchases").delete().eq("id",id);
loadPurchases();

}

</script>

</body>
</html>
